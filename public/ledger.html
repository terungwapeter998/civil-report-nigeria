<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Public Ledger - CivicSystem Nigeria</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-navy: #0b1220;
            --accent-green: #22c55e;
            --text: #cbd5e1;
            --card: #111827;
            --border: #1f2937;
            --mono: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .hero-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.2) saturate(0.5);
        }

        .topbar {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            text-decoration: none;
            color: white;
        }

        .brand span {
            color: var(--accent-green);
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            width: 90%;
            position: relative;
            z-index: 5;
        }

        .integrity-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .ledger-entry {
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 20px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .ledger-entry:hover {
            border-color: var(--accent-green);
            transform: translateY(-2px);
        }

        .entry-seq {
            font-family: var(--mono);
            font-size: 1.4rem;
            color: #475569;
            border-right: 1px solid var(--border);
            display: flex;
            justify-content: center;
        }

        .entry-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .type-tag {
            background: #1e293b;
            color: var(--accent-green);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-family: var(--mono);
            font-weight: 800;
        }

        .hash-chain {
            font-family: var(--mono);
            font-size: 11px;
            background: #05080f;
            padding: 12px;
            border-radius: 6px;
            color: #64748b;
            border: 1px solid #1e293b;
            word-break: break-all;
        }

        .hash-chain span {
            color: #475569;
            display: block;
            font-size: 9px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>

    <div class="hero-bg">
        <img src="../assets/image/hero-bg.jpg" alt="Ledger Infrastructure">
    </div>

    <header class="topbar">
        <a class="brand" href="../index.html">CIVIC<span>SYSTEM</span></a>
        <nav class="nav">
            <a href="../index.html" style="color: var(--text); text-decoration: none; font-size: 0.9rem;">Home</a>
        </nav>
    </header>

    <main class="container">
        <header style="text-align: center; margin-bottom: 50px;">
            <div class="integrity-badge">Cryptographically Verified</div>
            <h1 style="font-family: 'Montserrat'; font-size: 2.5rem; margin: 10px 0;">Public Ledger</h1>
            <p style="color: #94a3b8;">Immutable audit log of governance operations.</p>
        </header>

        <div id="ledgerStream">
            <div style="text-align: center; color: var(--text); opacity: 0.5;">Synchronizing with local node...</div>
        </div>
    </main>

    <script type="module">
        import { db } from "../firebase.js";
        import { collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const ledgerStream = document.getElementById("ledgerStream");

        // STAGE 6: Real-time Immutable Stream
        const q = query(
            collection(db, "ledger/civic-nigeria/events"),
            orderBy("seq", "desc"),
            limit(50)
        );

        onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                ledgerStream.innerHTML = "<div style='text-align:center'>No ledger entries found.</div>";
                return;
            }

            ledgerStream.innerHTML = "";

            snapshot.forEach((doc) => {
                const event = doc.data();
                const entry = document.createElement("div");
                entry.className = "ledger-entry";

                // Safe Timestamp conversion for Firestore
                const timeString = event.timestamp?.toDate
                    ? event.timestamp.toDate().toLocaleString()
                    : new Date(event.timestamp).toLocaleString();

                entry.innerHTML = `
                    <div class="entry-seq">#${event.seq}</div>
                    <div class="entry-body">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="type-tag">${event.type.toUpperCase()}</span>
                            <span style="font-size: 12px; color: #64748b;">${timeString}</span>
                        </div>
                        <div style="color: white; font-size: 0.95rem; line-height: 1.6;">
                            ${event.description || 'System state synchronized.'}
                        </div>
                        <div class="hash-chain">
                            <span>Block Hash (SHA-256)</span>
                            <code style="color: var(--accent-green);">${event.hash}</code>
                        </div>
                        <div class="hash-chain" style="opacity: 0.6;">
                            <span>Parent Hash</span>
                            <code>${event.prevHash || 'GENESIS_BLOCK'}</code>
                        </div>
                    </div>
                `;
                ledgerStream.appendChild(entry);
            });
        }, (error) => {
            console.error("Ledger Sync Fault:", error);
            ledgerStream.innerHTML = `<div style="color: var(--accent-red)">Sync Fault: ${error.message}</div>`;
        });
    </script>
</body>

</html>
