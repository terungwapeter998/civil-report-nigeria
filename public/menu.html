<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civic System Menu</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-navy: #0b1220;
            --accent-green: #22c55e;
            --text: #cbd5e1;
            --card: #111827;
            --border: #1f2937;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #000;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* 1. HERO PANEL */
        .hero-panel {
            flex: 1;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .hero-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            filter: brightness(0.7);
        }

        .hero-overlay-text {
            position: absolute;
            top: 40px;
            left: 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* 2. MENU TRIGGER */
        .menu-trigger-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 100;
            background: var(--accent-green);
            color: #000;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-trigger-btn:hover {
            transform: scale(1.05) translateY(-2px);
            background: #4ade80;
        }

        /* 3. MENU MODAL */
        .menu-modal {
            position: fixed;
            top: 0;
            right: -450px;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: rgba(11, 18, 32, 0.98);
            backdrop-filter: blur(20px);
            z-index: 200;
            box-shadow: -20px 0 80px rgba(0, 0, 0, 0.9);
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
        }

        .menu-modal.active {
            right: 0;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .menu-header {
            padding: 40px 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            text-decoration: none;
            color: white;
            font-weight: 800;
        }

        .brand span {
            color: var(--accent-green);
        }

        .close-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .menu-content {
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            font-weight: 600;
        }

        a.link {
            padding: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        a.link:hover {
            border-color: var(--accent-green);
            color: white;
            background: rgba(34, 197, 94, 0.05);
            transform: translateX(-5px);
        }

        .admin-block {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .badge {
            background: var(--accent-green);
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
        }

        #logoutBtn {
            margin-top: 30px;
            border-color: #ef4444;
            color: #ef4444;
        }

        #logoutBtn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #f87171;
            color: #f87171;
        }
    </style>
</head>

<body>

    <div class="hero-panel">
        <div class="hero-overlay-text" id="authStatus">Initialising Secure Session...</div>
        <img src="assets/image/hero-bg.jpg" alt="Civic Engagement Background">
    </div>

    <button class="menu-trigger-btn" id="openMenu">
        <span>MENU</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div class="modal-overlay" id="overlay"></div>

    <div class="menu-modal" id="menuModal">
        <div class="menu-header">
            <a class="brand" href="#">CIVIC<span>SYSTEM</span></a>
            <button class="close-btn" id="closeMenu">CLOSE ✕</button>
        </div>

        <div class="menu-content">
            <div class="section-title">Operations</div>
            <a class="link" href="dashboard.html"><span>Dashboard</span> <span>→</span></a>
            <a class="link" href="report.html"><span>Report Issue</span> <span>→</span></a>
            <a class="link" href="my-reports.html"><span>My Reports</span> <span>→</span></a>

            <div class="admin-block">
                <div class="section-title">Administration <span class="badge">SECURE</span></div>
                <a class="link" href="admin.html"><span>Admin Panel</span> <span>→</span></a>
                <a class="link" href="ledger.html"><span>Ledger View</span> <span>→</span></a>
            </div>

            <a class="link" id="logoutBtn" href="#"><span>Terminate Session</span> <span>⎋</span></a>
        </div>
    </div>

    <script>
        const openBtn = document.getElementById('openMenu');
        const closeBtn = document.getElementById('closeMenu');
        const modal = document.getElementById('menuModal');
        const overlay = document.getElementById('overlay');

        const toggleMenu = (isOpen) => {
            modal.classList.toggle('active', isOpen);
            overlay.classList.toggle('active', isOpen);
        };

        openBtn.addEventListener('click', () => toggleMenu(true));
        closeBtn.addEventListener('click', () => toggleMenu(false));
        overlay.addEventListener('click', () => toggleMenu(false));

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') toggleMenu(false);
        });
    </script>

    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const authStatus = document.getElementById('authStatus');
        const logoutBtn = document.getElementById('logoutBtn');

        // Monitor identity status
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authStatus.innerText = `Identity Verified • ${user.email}`;
            } else {
                authStatus.innerText = "Guest Mode • Please Sign In";
                // Optional: window.location.href = 'index.html';
            }
        });

        // Terminate Session
        logoutBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            if (confirm("Confirm session termination?")) {
                try {
                    await signOut(auth);
                    window.location.href = "index.html";
                } catch (err) {
                    console.error("Logout failed", err);
                }
            }
        });
    </script>

</body>

</html>
