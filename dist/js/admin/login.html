<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Auth - CivicReport Nigeria</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-navy: #0b1220;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --text: #cbd5e1;
            --border: #1f2937;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .hero-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.2) grayscale(0.8);
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
        }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            text-decoration: none;
            color: white;
            letter-spacing: -1px;
        }

        .brand span {
            color: var(--accent-red);
        }

        .auth-container {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 440px;
            background: rgba(11, 18, 32, 0.9);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            border-top: 4px solid var(--accent-red);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Stage 6 Locked State */
        .auth-container.processing {
            opacity: 0.6;
            pointer-events: none;
            transform: scale(0.98);
        }

        .danger-zone {
            color: var(--accent-red);
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        h2 {
            margin: 0 0 10px 0;
            font-family: 'Montserrat';
            font-size: 1.8rem;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        input {
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 6px;
            color: white;
            outline: none;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--accent-red);
        }

        .btn.danger {
            background: var(--accent-red);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Montserrat';
            transition: filter 0.2s;
        }

        .btn.danger:disabled {
            filter: brightness(0.5);
            cursor: not-allowed;
        }

        .msg {
            font-size: 0.85rem;
            text-align: center;
            color: var(--accent-red);
            margin-top: 15px;
            min-height: 1.2em;
        }
    </style>
</head>

<body>

    <div class="hero-bg">
        <img src="../assets/image/hero-bg.jpg" alt="Secure Infrastructure">
    </div>

    <header class="topbar">
        <a class="brand" href="../index.html">CIVIC<span>SYSTEM</span></a>
        <nav class="nav">
            <a href="../index.html" style="color: var(--text); text-decoration: none; font-size: 0.9rem;">Home</a>
        </nav>
    </header>

    <main class="auth-container" id="authBox">
        <span class="danger-zone">Secure Infrastructure Access</span>
        <h2>Admin Auth</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px;">
            Access restricted to authorized personnel. Ledger synchronization requires administrative clearance.
        </p>

        <form id="adminLoginForm" class="form">
            <label for="email">Institutional Email</label>
            <input type="email" id="email" required placeholder="name@civic.gov.ng" autocomplete="email" />

            <label for="password">Security Credential</label>
            <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password" />

            <button type="submit" class="btn danger" id="authBtn">AUTHORIZE SESSION</button>

            <p id="msg" class="msg"></p>
        </form>
    </main>

    <script type="module">
        // --- ATOMIC IMPORTS ---
        // Ensure path correctly steps out to project root 'js' folder
        import { db, auth } from '../js/firebase-config.js';
        import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const loginForm = document.getElementById('adminLoginForm');
        const authBox = document.getElementById('authBox');
        const msgDisplay = document.getElementById('msg');
        const authBtn = document.getElementById('authBtn');

        /**
         * STAGE 6 ROLE VERIFICATION (DETERMINISTIC)
         */
        async function verifyClearance(user) {
            if (!user) return;

            try {
                authBox.classList.add('processing');
                msgDisplay.textContent = "Verifying Role Clearance...";
                msgDisplay.style.color = "var(--text)";

                const userDoc = await getDoc(doc(db, "users", user.uid));

                if (userDoc.exists() && userDoc.data().role === 'ADMIN') {
                    msgDisplay.style.color = "var(--accent-green)";
                    msgDisplay.textContent = "Access Granted. Initializing Control Plane...";

                    // Replace prevents the user from going 'back' into the login form
                    setTimeout(() => {
                        window.location.replace("dashboard.html");
                    }, 1200);
                } else {
                    throw new Error("INSUFFICIENT_PRIVILEGES");
                }
            } catch (err) {
                console.error("Auth Stress-Test Failed:", err.message);
                msgDisplay.textContent = err.message === "INSUFFICIENT_PRIVILEGES"
                    ? "Access Denied: Administrative Role Not Found."
                    : "Security Error: " + err.message;

                msgDisplay.style.color = "var(--accent-red)";
                authBox.classList.remove('processing');
                await signOut(auth);
            }
        }

        /**
         * SINGLE SOURCE OF TRUTH: AUTH OBSERVER
         */
        onAuthStateChanged(auth, (user) => {
            if (user) {
                verifyClearance(user);
            } else {
                authBox.classList.remove('processing');
                authBtn.disabled = false;
            }
        });

        /**
         * INPUT HANDLER
         */
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            try {
                authBtn.disabled = true;
                msgDisplay.textContent = "Contacting Auth Node...";
                msgDisplay.style.color = "var(--text)";

                // We rely on the Observer to trigger verifyClearance upon success
                await signInWithEmailAndPassword(auth, email, pass);

            } catch (err) {
                authBtn.disabled = false;
                msgDisplay.textContent = "Auth Failed: " + err.message;
                msgDisplay.style.color = "var(--accent-red)";
            }
        });
    </script>
</body>

</html>
