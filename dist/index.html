<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSystem | Institutional Infrastructure</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-navy: #0b1220;
            --accent-green: #22c55e;
            --text-slate: #94a3b8;
            --card-bg: rgba(17, 24, 39, 0.8);
            --border: #1f2937;
            --error-red: #ef4444;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
        }

        /* BACKGROUND (unchanged) */
        .bg-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(11, 18, 32, 0.4) 0%, #000 100%);
            z-index: 1;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.4);
            z-index: 0;
        }

        /* MAIN CONTENT */
        .main-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .brand-header {
            margin-bottom: 40px;
        }

        .brand-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            margin: 0;
        }

        .brand-header span {
            color: var(--accent-green);
        }

        .brand-header p {
            color: var(--text-slate);
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
        }

        input {
            width: 100%;
            background: #0b1220;
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
        }

        .btn-primary {
            width: 100%;
            background: var(--accent-green);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
        }

        .status-msg {
            margin-top: 15px;
            font-size: 0.8rem;
        }
    </style>
  <script type="module" crossorigin src="/assets/index-Cv87SeG8.js"></script>
</head>

<body>

    <!-- BACKGROUND -->
    <div class="bg-overlay"></div>
    <img src="assets/image/hero-bg.jpg" class="hero-bg">

    <!-- CONTENT -->
    <div class="main-wrapper">

        <div class="brand-header">
            <h1>CIVIC<span>SYSTEM</span></h1>
            <p>Citizens' Assembly</p>
        </div>

        <div class="login-card">
            <form id="loginForm">
                <input type="email" id="email" placeholder="name@civicsystem.ng" required>
                <input type="password" id="password" placeholder="••••••••" required>
                <button type="submit" class="btn-primary">INITIALIZE SESSION</button>
            </form>

            <div id="statusMsg" class="status-msg"></div>
        </div>

    </div>

    <!-- ❌ REMOVED: This caused forced redirect -->
    <!-- <script type="module" src="/src/main.jsx"></script> -->


</body>

</html>
